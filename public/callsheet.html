<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call Sheet — Slate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
      --border: #2a2a2a; --text: #e8e8e4; --text-sec: #9a9a90; --text-ter: #5a5a54;
      --accent: #4a90d9; --green: #6ec96e; --amber: #f59e0b;
      --radius: 10px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; padding:0 0 60px }
    .hero { background:linear-gradient(160deg,#1a1a2e,#16213e); padding:32px 20px 28px; text-align:center; border-bottom:0.5px solid var(--border) }
    .logo { height:26px; opacity:0.8; margin-bottom:20px }
    .project-name { font-size:13px; color:var(--text-sec); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px }
    .sheet-date { font-size:20px; font-weight:600; margin-bottom:20px; line-height:1.4 }
    .call-block { display:inline-block; background:rgba(74,144,217,0.15); border:0.5px solid rgba(74,144,217,0.4); border-radius:12px; padding:16px 32px; margin-bottom:8px }
    .call-label { font-size:11px; color:var(--accent); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:4px }
    .call-name { font-size:17px; font-weight:600; margin-bottom:2px }
    .call-time { font-size:42px; font-weight:700; color:var(--accent); line-height:1 }
    .call-role { font-size:13px; color:var(--text-sec); margin-top:4px }
    .general-call { font-size:13px; color:var(--text-sec); margin-top:12px }
    .wrap { max-width:560px; margin:0 auto; padding:0 16px }
    .section { margin-top:16px; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); overflow:hidden }
    .section-head { padding:10px 16px; font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-ter); border-bottom:0.5px solid var(--border); background:var(--surface2) }
    .row { padding:11px 16px; border-bottom:0.5px solid var(--border); font-size:13px }
    .row:last-child { border-bottom:none }
    .row-label { font-size:10px; color:var(--text-ter); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:3px }
    .sched-row { display:flex; gap:12px; padding:11px 16px; border-bottom:0.5px solid var(--border); font-size:14px }
    .sched-row:last-child { border-bottom:none }
    .sched-date-head { padding:7px 16px; font-size:10px; font-weight:600; color:var(--accent); text-transform:uppercase; letter-spacing:0.5px; border-bottom:0.5px solid var(--border); background:rgba(74,144,217,0.06) }
    .sched-time { color:var(--accent); font-weight:500; white-space:nowrap; min-width:52px; font-variant-numeric:tabular-nums }
    .sched-desc { color:var(--text); line-height:1.4 }
    .loc-body { padding:14px 16px }
    .loc-name { font-size:15px; font-weight:500; margin-bottom:4px }
    .loc-addr { font-size:13px; color:var(--text-sec); line-height:1.5; margin-bottom:10px }
    .maps-btn { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:rgba(74,144,217,0.12); border:0.5px solid rgba(74,144,217,0.3); border-radius:8px; color:var(--accent); font-size:13px; text-decoration:none; font-family:var(--font) }
    .crew-row { display:flex; justify-content:space-between; align-items:flex-start; padding:10px 16px; border-bottom:0.5px solid var(--border); font-size:13px; gap:8px }
    .crew-row:last-child { border-bottom:none }
    .crew-row.me { background:rgba(74,144,217,0.08) }
    .crew-name { font-weight:500 }
    .crew-role { font-size:11px; color:var(--text-ter); margin-top:1px }
    .crew-co { font-size:11px; color:var(--text-ter); margin-top:1px; font-style:italic }
    .crew-phone { font-size:11px; color:var(--text-ter); margin-top:1px }
    .crew-time { font-weight:600; color:var(--accent); white-space:nowrap; margin-left:8px; flex-shrink:0; text-align:right }
    .notes-body { padding:14px 16px; font-size:13px; color:var(--text-sec); line-height:1.7; white-space:pre-line }
    .notes-callout { background:#1e1a08; border:1px solid #4a3d0a; border-left:3px solid var(--amber); padding:14px 16px; margin:16px 0; border-radius:var(--radius); font-size:13px; color:#d4a820; line-height:1.6 }
    .notes-callout-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:6px; color:var(--amber) }
    .equip-row { padding:12px 16px; border-bottom:0.5px solid var(--border) }
    .equip-row:last-child { border-bottom:none }
    .equip-cat { font-size:12px; font-weight:600; color:var(--text); margin-bottom:2px }
    .equip-supplier { font-size:11px; color:var(--accent); margin-bottom:4px }
    .equip-desc { font-size:12px; color:var(--text-sec); line-height:1.5; white-space:pre-line }
    .cal-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px; background:rgba(110,201,110,0.12); border:0.5px solid rgba(110,201,110,0.3); border-radius:8px; color:var(--green); font-size:14px; font-weight:500; text-decoration:none; font-family:var(--font); margin-top:12px }
    .loading { text-align:center; padding:80px 20px; color:var(--text-ter) }
    .error-state { text-align:center; padding:80px 20px }
    .error-state h2 { font-size:18px; margin-bottom:8px }
    .error-state p { color:var(--text-sec); font-size:14px }
    .pill { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 8px; border-radius:12px; background:var(--surface2); border:0.5px solid var(--border) }
  </style>
</head>
<body>
  <div id="root"><div class="loading">Loading…</div></div>
  <script type="module">
    const parts = location.pathname.split('/call/')[1]?.split('/')
    const sheetToken = parts?.[0]
    const crewToken  = parts?.[1]
    if (!sheetToken) {
      document.getElementById('root').innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This call sheet link is not valid.</p></div>`
      throw new Error('No token')
    }

    const res = await fetch(`/api/callsheet?token=${sheetToken}${crewToken?'&crew='+crewToken:''}`)
    if (!res.ok) {
      document.getElementById('root').innerHTML = `<div class="error-state"><h2>Not found</h2><p>This call sheet link has expired or doesn't exist.</p></div>`
      throw new Error('Not found')
    }
    const { sheet, project, client, studio, thisCrew, crew, schedule, locations } = await res.json()

    const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    const nl  = s => esc(s).replace(/\n/g,'<br>')
    const fmtDate = s => {
      if (!s) return ''
      const d = new Date(String(s).split('T')[0] + 'T12:00:00')
      return isNaN(d) ? '' : d.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
    }
    const fmtDateShort = s => {
      if (!s) return ''
      const d = new Date(String(s).split('T')[0] + 'T12:00:00')
      return isNaN(d) ? '' : d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})
    }
    const fmtDT = s => {
      if (!s) return ''
      try { return new Date(s).toLocaleString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) } catch { return s }
    }
    const mapPin = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>`

    document.title = `${project.name} — Call Sheet`

    const dates = Array.isArray(sheet.shoot_dates) ? sheet.shoot_dates.filter(d=>d.date).sort((a,b)=>a.date<b.date?-1:1) : []
    const hotels = Array.isArray(sheet.hotels) ? sheet.hotels.filter(h=>h.name) : []
    const equipment = Array.isArray(sheet.equipment) ? sheet.equipment.filter(e=>e.category) : []
    const csNotes = sheet.crew_section_notes || {}
    const allCrewNames = crew.filter(c=>c.name).map(c=>c.name)

    // ── Hero ──────────────────────────────────────────────────────────────────
    const dateDisplay = dates.length > 1
      ? dates.map(d => `<div>${esc(fmtDateShort(d.date))}${d.general_call?` &middot; GC <strong>${esc(d.general_call)}</strong>`:''}</div>`).join('')
      : esc(fmtDate(dates[0]?.date || sheet.date))

    const heroHTML = (() => {
      const firstDate = dates[0]?.date
      if (!thisCrew) {
        // Master view — show general call + countdown to first day
        const gc = sheet.general_call || dates[0]?.general_call || ''
        const countdown = (() => {
          if (!gc || !firstDate) return ''
          const [h,m] = gc.split(':').map(Number)
          const target = new Date(`${String(firstDate).split('T')[0]}T${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}:00`)
          const diff = target - new Date()
          if (isNaN(diff) || diff < 0) return diff > -8*3600*1000 ? '<div style="font-size:13px;color:var(--amber);margin-top:8px;font-weight:500">🎬 Shoot is live</div>' : ''
          const days=Math.floor(diff/86400000), hrs=Math.floor((diff%86400000)/3600000), mins=Math.floor((diff%3600000)/60000)
          if (days>14) return `<div style="font-size:12px;color:var(--text-ter);margin-top:8px">in ${days} days</div>`
          if (days>=1) return `<div style="font-size:12px;color:var(--text-sec);margin-top:8px">in ${days}d ${hrs}h</div>`
          if (hrs>=1)  return `<div style="font-size:12px;color:var(--amber);margin-top:8px;font-weight:500">in ${hrs}h ${mins}m</div>`
          return `<div style="font-size:13px;color:#ef4444;margin-top:8px;font-weight:600">⚡ in ${mins} mins</div>`
        })()
        return gc ? `<div class="general-call">General call: <strong>${esc(gc)}</strong>${countdown}</div>` : countdown
      }
      const callTimes = thisCrew.call_times && typeof thisCrew.call_times === 'object' ? thisCrew.call_times : {}
      const firstKey  = firstDate ? String(firstDate).split('T')[0] : null
      const myCall    = (firstKey && callTimes[firstKey]) || Object.values(callTimes)[0] || sheet.general_call || ''
      // Calendar link
      const calDateStr = firstDate ? String(firstDate).split('T')[0].replace(/-/g,'') : ''
      const [cH,cM] = (myCall||'09:00').split(':').map(Number)
      const calStart = calDateStr ? calDateStr+'T'+String(cH||9).padStart(2,'0')+String(cM||0).padStart(2,'0')+'00' : ''
      const calEnd   = calDateStr ? calDateStr+'T'+String(Math.min((cH||9)+10,23)).padStart(2,'0')+String(cM||0).padStart(2,'0')+'00' : ''
      const calURL   = calStart ? `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(project.name+' — '+thisCrew.name+' shoot')}&dates=${calStart}/${calEnd}&location=${encodeURIComponent(sheet.location_address||sheet.location_name||'')}&details=${encodeURIComponent('Call time: '+(myCall||'TBC'))}` : ''
      const countdown = (() => {
        if (!myCall || !firstDate) return ''
        const [h,m] = myCall.split(':').map(Number)
        const target = new Date(`${String(firstDate).split('T')[0]}T${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}:00`)
        const diff = target - new Date()
        if (isNaN(diff) || diff < 0) return diff > -8*3600*1000 ? '<div style="font-size:12px;color:var(--amber);margin-top:6px;font-weight:500">🎬 Shoot is live</div>' : ''
        const days=Math.floor(diff/86400000), hrs=Math.floor((diff%86400000)/3600000), mins=Math.floor((diff%3600000)/60000)
        if (days>14) return `<div style="font-size:12px;color:var(--text-ter);margin-top:6px">in ${days} days</div>`
        if (days>=1) return `<div style="font-size:12px;color:var(--text-sec);margin-top:6px">in ${days}d ${hrs}h</div>`
        if (hrs>=1)  return `<div style="font-size:12px;color:var(--amber);margin-top:6px;font-weight:500">in ${hrs}h ${mins}m</div>`
        return `<div style="font-size:13px;color:#ef4444;margin-top:6px;font-weight:600">⚡ in ${mins} mins</div>`
      })()
      const calBtn = calURL ? `<a href="${calURL}" target="_blank" class="cal-btn">📅 Add to Google Calendar</a>` : ''
      if (dates.length > 1) {
        return `<div class="call-block">
          <div class="call-label">Your call times</div>
          <div class="call-name">${esc(thisCrew.name)}</div>
          <div style="margin-top:8px">
            ${dates.map(d => { const k=String(d.date).split('T')[0]; const t=callTimes[k]||'TBC'; return `<div style="font-size:13px;color:var(--text-sec);margin-bottom:2px">${esc(fmtDateShort(d.date))} <strong style="color:var(--accent)">${esc(t)}</strong></div>` }).join('')}
          </div>
          ${thisCrew.role ? `<div class="call-role">${esc(thisCrew.role)}</div>` : ''}
          ${calBtn}
        </div>`
      }
      return `<div class="call-block">
        <div class="call-label">Your call time</div>
        <div class="call-name">${esc(thisCrew.name)}</div>
        <div class="call-time">${esc(myCall||'TBC')}</div>
        ${thisCrew.role ? `<div class="call-role">${esc(thisCrew.role)}</div>` : ''}
        ${countdown}
        ${calBtn}
      </div>`
    })()

    // ── Sections ──────────────────────────────────────────────────────────────

    // Notes callout
    const notesCallout = sheet.notes ? `
      <div class="notes-callout">
        <div class="notes-callout-label">📌 Shoot notes</div>
        ${nl(sheet.notes)}
      </div>` : ''

    // Schedule (grouped by date)
    const schedHTML = (() => {
      if (!schedule.length) return ''
      const hasDateField = schedule.some(s => s.date)
      const schedRow = s => `<div class="sched-row"><div class="sched-time">${esc(s.time||'')}</div><div class="sched-desc">${esc(s.description||'')}</div></div>`
      if (!hasDateField || dates.length <= 1) {
        return `<div class="section"><div class="section-head">Schedule</div>${schedule.map(schedRow).join('')}</div>`
      }
      const allDay = schedule.filter(s => !s.date)
      let out = '<div class="section"><div class="section-head">Schedule</div>'
      if (allDay.length) out += allDay.map(schedRow).join('')
      dates.forEach(d => {
        const items = schedule.filter(s => s.date === d.date)
        if (!items.length) return
        out += `<div class="sched-date-head">${esc(fmtDateShort(d.date))}</div>`
        out += items.map(schedRow).join('')
      })
      return out + '</div>'
    })()

    // Production company
    const studioHTML = (studio?.name || studio?.address) ? `
      <div class="section">
        <div class="section-head">Production company</div>
        <div class="row">
          <div style="font-size:14px;font-weight:500;margin-bottom:${studio.address?'4px':'0'}">${esc(studio.name||'')}</div>
          ${studio.address ? `<div style="font-size:12px;color:var(--text-sec);line-height:1.5">${nl(studio.address)}</div>` : ''}
        </div>
      </div>` : ''

    // Location
    const locHTML = (sheet.location_name || sheet.location_address) ? (() => {
      const q = sheet.location_address || sheet.location_name
      const mapLink = sheet.location_map_link || ''
      const coordMatch = mapLink.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) || mapLink.match(/\/search\/(-?\d+\.\d+),\+?(-?\d+\.\d+)/) || mapLink.match(/3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/)
      const embedSrc = coordMatch
        ? `https://maps.google.com/maps?q=${coordMatch[1]},${coordMatch[2]}&z=15&output=embed`
        : q ? `https://maps.google.com/maps?q=${encodeURIComponent(q)}&z=15&output=embed` : null
      return `<div class="section">
        <div class="section-head">Location</div>
        ${embedSrc ? `<div style="border-bottom:0.5px solid var(--border)"><iframe src="${embedSrc}" width="100%" height="200" style="border:none;display:block" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>` : ''}
        <div class="loc-body">
          ${sheet.location_name ? `<div class="loc-name">${esc(sheet.location_name)}</div>` : ''}
          ${sheet.location_address ? `<div class="loc-addr">${esc(sheet.location_address)}</div>` : ''}
          ${mapLink ? `<a href="${mapLink}" target="_blank" class="maps-btn">${mapPin} Open in Maps</a>` : q ? `<a href="https://maps.google.com/?q=${encodeURIComponent(q)}" target="_blank" class="maps-btn">${mapPin} Open in Maps</a>` : ''}
          ${sheet.weather_text ? `<div style="margin-top:12px;padding:10px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--text-sec)">🌤 ${esc(sheet.weather_text)}</div>` : ''}
        </div>
        ${sheet.parking_notes ? `<div style="padding:10px 16px;border-top:0.5px solid var(--border)"><div class="row-label">🅿 Parking</div><div style="font-size:13px;color:var(--text-sec)">${esc(sheet.parking_notes)}</div></div>` : ''}
        ${sheet.nearest_transport ? `<div style="padding:10px 16px;border-top:0.5px solid var(--border)"><div class="row-label">🚂 Transport</div><div style="font-size:13px;color:var(--text-sec)">${esc(sheet.nearest_transport)}</div></div>` : ''}
      </div>`
    })() : ''

    // Additional locations
    const extraLocsHTML = locations.length ? locations.map(loc => `
      <div class="section">
        <div class="section-head">📍 ${esc(loc.name||'Additional location')}</div>
        <div class="loc-body">
          ${loc.move_time ? `<div style="font-size:11px;color:var(--amber);margin-bottom:6px;font-weight:500">Move: ${esc(loc.move_time)}</div>` : ''}
          ${loc.address ? `<div class="loc-addr">${esc(loc.address)}</div>` : ''}
          ${loc.address ? `<a href="https://maps.google.com/?q=${encodeURIComponent(loc.address)}" target="_blank" class="maps-btn">${mapPin} Open in Maps</a>` : ''}
          ${loc.notes ? `<div style="margin-top:10px;font-size:13px;color:var(--text-sec)">${esc(loc.notes)}</div>` : ''}
        </div>
      </div>`).join('') : ''

    // Hotels — filter to assigned if crew token
    const hotelsHTML = (() => {
      const visible = hotels.filter(h => {
        if (!thisCrew) return true
        const assigned = h.assigned_crew || []
        const allIn = allCrewNames.length && (assigned.length === 0 || allCrewNames.every(n => assigned.includes(n)))
        return allIn || assigned.includes(thisCrew.name)
      })
      if (!visible.length) return ''
      return visible.map(h => {
        const assigned = h.assigned_crew || []
        const allIn = allCrewNames.length && (assigned.length === 0 || allCrewNames.every(n => assigned.includes(n)))
        const guests = allIn ? 'All athletes, crew and client' : assigned.join(', ')
        return `<div class="section">
          <div class="section-head">🏨 Accommodation</div>
          <div class="row">
            <div style="font-size:15px;font-weight:600;margin-bottom:4px">${esc(h.name)}</div>
            ${h.address ? `<div style="font-size:12px;color:var(--text-sec);margin-bottom:8px">${esc(h.address)}</div>` : ''}
            ${h.address ? `<a href="https://maps.google.com/?q=${encodeURIComponent(h.address)}" target="_blank" class="maps-btn" style="margin-bottom:10px;display:inline-flex">${mapPin} Open in Maps</a>` : ''}
            ${(h.check_in||h.check_out) ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
              ${h.check_in ? `<div><div class="row-label">Check-in</div><div style="font-size:13px;font-weight:500">${esc(fmtDT(h.check_in))}</div></div>` : ''}
              ${h.check_out ? `<div><div class="row-label">Check-out</div><div style="font-size:13px;font-weight:500">${esc(fmtDT(h.check_out))}</div></div>` : ''}
            </div>` : ''}
            ${guests && !thisCrew ? `<div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--border)"><div class="row-label">Guests</div><div style="font-size:12px;color:var(--text-sec);margin-top:3px">${esc(guests)}</div></div>` : ''}
            ${h.notes ? `<div style="margin-top:10px;font-size:12px;color:var(--text-sec);font-style:italic">${esc(h.notes)}</div>` : ''}
          </div>
        </div>`
      }).join('')
    })()

    // Crew sections (Client → On Camera → Crew)
    const renderCrewSection = (label, type) => {
      const filtered = crew.filter(c => c.name && (c.crew_type||'crew') === type)
      const sectionNote = csNotes[type] || ''
      if (!filtered.length && !sectionNote) return ''
      const multi = dates.length > 1
      return `<div class="section">
        <div class="section-head">${esc(label)}</div>
        ${filtered.map(c => {
          const callTimes = c.call_times && typeof c.call_times === 'object' ? c.call_times : {}
          let timeBlock = ''
          if (type === 'crew' || type === 'on_camera') {
            if (multi) {
              timeBlock = `<div style="flex-shrink:0;text-align:right">
                ${dates.map(d => {
                  const k = String(d.date).split('T')[0]
                  const t = callTimes[k] || 'TBC'
                  return `<div style="font-size:11px"><span style="color:var(--text-ter);margin-right:4px">${esc(fmtDateShort(d.date))}</span><strong style="color:var(--accent)">${esc(t)}</strong></div>`
                }).join('')}
              </div>`
            } else {
              const k = dates[0] ? String(dates[0].date).split('T')[0] : null
              const t = (k && callTimes[k]) || Object.values(callTimes)[0] || c.call_time || 'TBC'
              timeBlock = `<div class="crew-time">${esc(t)}</div>`
            }
          }
          return `<div class="crew-row ${thisCrew&&c.crew_token===thisCrew.crew_token?'me':''}">
            <div style="flex:1;min-width:0">
              <div class="crew-name">${esc(c.name)}</div>
              ${c.role ? `<div class="crew-role">${esc(c.role)}</div>` : ''}
              ${c.co ? `<div class="crew-co">c/o ${esc(c.co)}</div>` : ''}
              ${c.phone ? `<div class="crew-phone"><a href="tel:${esc(c.phone)}" style="color:var(--text-ter);text-decoration:none">📞 ${esc(c.phone)}</a></div>` : ''}
            </div>
            ${timeBlock}
          </div>`
        }).join('')}
        ${sectionNote ? `<div style="padding:10px 16px;font-size:12px;font-style:italic;color:var(--text-sec);border-top:0.5px solid var(--border)">${esc(sectionNote)}</div>` : ''}
      </div>`
    }

    // Catering
    const catering = sheet.catering || {}
    const cateringHTML = (catering.supplier || catering.notes) ? `
      <div class="section">
        <div class="section-head">Catering</div>
        <div class="row">
          ${catering.supplier ? `<div style="font-size:13px;font-weight:500;margin-bottom:${catering.notes?'6px':'0'}">C/O ${esc(catering.supplier)}</div>` : ''}
          ${catering.notes ? `<div style="font-size:13px;color:var(--text-sec);line-height:1.6;white-space:pre-line">${esc(catering.notes)}</div>` : ''}
        </div>
      </div>` : ''

    // Equipment
    const equipHTML = equipment.length ? `
      <div class="section">
        <div class="section-head">Equipment</div>
        ${equipment.map(e => `
          <div class="equip-row">
            <div class="equip-cat">${esc(e.category)}</div>
            ${e.supplier ? `<div class="equip-supplier">C/O ${esc(e.supplier)}</div>` : ''}
            ${e.description ? `<div class="equip-desc">${esc(e.description)}</div>` : ''}
          </div>`).join('')}
      </div>` : ''

    // Insurance
    const insurer = sheet.insurer || {}
    const insuranceHTML = insurer.name ? `
      <div class="section">
        <div class="section-head">Insurance</div>
        <div class="row">
          <div style="font-size:14px;font-weight:500;margin-bottom:4px">${esc(insurer.name)}</div>
          ${insurer.address ? `<div style="font-size:12px;color:var(--text-sec);margin-bottom:6px">${esc(insurer.address)}</div>` : ''}
          ${insurer.contact ? `<div style="font-size:12px;color:var(--text-sec)">Contact: ${esc(insurer.contact)}${insurer.email?` &middot; <a href="mailto:${esc(insurer.email)}" style="color:var(--accent)">${esc(insurer.email)}</a>`:''}</div>` : insurer.email ? `<div style="font-size:12px"><a href="mailto:${esc(insurer.email)}" style="color:var(--accent)">${esc(insurer.email)}</a></div>` : ''}
          <div style="font-size:11px;color:var(--text-ter);margin-top:8px;line-height:1.5">The Producer / Production Manager must be notified of any potential insurance claims on the day of the shoot.</div>
        </div>
      </div>` : ''

    // Emergency services
    const emergencyHTML = (() => {
      const svcs = []
      if (sheet.nearest_hospital_name||sheet.nearest_hospital_address) svcs.push({icon:'🏥',label:'Hospital A&E',name:sheet.nearest_hospital_name,addr:sheet.nearest_hospital_address})
      if (sheet.nearest_police_name||sheet.nearest_police_address) svcs.push({icon:'🚔',label:'Police',name:sheet.nearest_police_name,addr:sheet.nearest_police_address})
      if (sheet.nearest_fire_name||sheet.nearest_fire_address) svcs.push({icon:'🚒',label:'Fire station',name:sheet.nearest_fire_name,addr:sheet.nearest_fire_address})
      if (!svcs.length) return ''
      return `<div class="section"><div class="section-head">Emergency Services</div>${svcs.map(sv => `
        <div class="row">
          <div class="row-label">${sv.icon} ${sv.label}</div>
          <div style="font-size:14px;font-weight:500">${esc(sv.name||'')}</div>
          ${sv.addr ? `<div style="font-size:12px;color:var(--text-sec);margin-top:2px">${esc(sv.addr)}</div>` : ''}
          ${sv.addr ? `<a href="https://maps.google.com/?q=${encodeURIComponent(sv.addr)}" target="_blank" class="maps-btn" style="margin-top:8px;display:inline-flex">${mapPin} Directions</a>` : ''}
        </div>`).join('')}</div>`
    })()

    // H&S
    const hsHTML = sheet.hs_notes ? `
      <div class="section">
        <div class="section-head">Health &amp; Safety</div>
        <div class="notes-body">${nl(sheet.hs_notes)}</div>
      </div>` : ''

    // Invoicing
    const invoicing = sheet.invoicing || {}
    const invoicingHTML = (invoicing.email || invoicing.job_ref || invoicing.boilerplate) ? `
      <div class="section">
        <div class="section-head">Invoicing</div>
        ${invoicing.email ? `<div class="row"><div class="row-label">Send invoices to</div><a href="mailto:${esc(invoicing.email)}" style="font-size:13px;color:var(--accent)">${esc(invoicing.email)}</a></div>` : ''}
        ${invoicing.job_ref ? `<div class="row"><div class="row-label">Job reference</div><div style="font-size:13px;font-weight:600">${esc(invoicing.job_ref)}</div></div>` : ''}
        ${invoicing.boilerplate ? `<div class="notes-body" style="font-size:12px;color:var(--text-ter)">${nl(invoicing.boilerplate)}</div>` : ''}
      </div>` : ''

    // ── Compose ───────────────────────────────────────────────────────────────
    document.getElementById('root').innerHTML = `
      <div class="hero">
        <img src="/slate-logo-white.png" alt="Slate" class="logo" onerror="this.style.display='none'" />
        <div class="project-name">${esc(project.name)}</div>
        <div class="sheet-date">${dateDisplay}</div>
        ${heroHTML}
      </div>
      <div class="wrap">
        ${notesCallout}
        ${schedHTML}
        ${studioHTML}
        ${locHTML}
        ${extraLocsHTML}
        ${hotelsHTML}
        ${renderCrewSection('Client', 'client')}
        ${renderCrewSection('On Camera', 'on_camera')}
        ${renderCrewSection('Crew', 'crew')}
        ${equipHTML}
        ${cateringHTML}
        ${emergencyHTML}
        ${insuranceHTML}
        ${hsHTML}
        ${invoicingHTML}
        <div style="text-align:center;margin-top:32px;font-size:11px;color:var(--text-ter)">Powered by Slate</div>
      </div>`
  </script>
</body>
</html>
