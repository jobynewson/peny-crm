<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Importing…</title></head>
<body>
<script>
  // Receive text from bookmarklet via postMessage after opening
  // The bookmarklet opens this page, waits for it to load, then sends the text
  window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'slate-import') {
      try { localStorage.setItem('slate-import-text', e.data.text) } catch(err) {}
      location.replace('/')
    }
  })
  // Signal to opener that we're ready
  if (window.opener) window.opener.postMessage('slate-relay-ready', '*')
</script>
<p style="font-family:sans-serif;color:#888;padding:40px;text-align:center">Importing to Slate…</p>
</body>
</html>
