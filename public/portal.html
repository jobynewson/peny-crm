<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Portal — Slate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --surface3: #2c2c2c;
      --border: #2a2a2a; --border2: #353535;
      --text: #e8e8e4; --text-sec: #9a9a90; --text-ter: #5a5a54;
      --accent: #4a90d9; --green: #6ec96e; --amber: #f59e0b; --purple: #a78bfa; --red: #ef4444;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column }

    /* ── Loading / Error ── */
    .full-center { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-ter) }
    .error-state { text-align: center }
    .error-state h2 { font-size: 18px; margin-bottom: 8px }
    .error-state p  { color: var(--text-sec); font-size: 14px }

    /* ── Header ── */
    .portal-header { flex-shrink: 0; height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 14px; padding: 0 20px }
    .portal-logo   { height: 22px; opacity: 0.85; flex-shrink: 0 }
    .hdr-sep       { width: 1px; height: 18px; background: var(--border2); flex-shrink: 0 }
    .hdr-project   { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .hdr-client    { font-size: 13px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .hdr-status    { font-size: 11px; font-weight: 500; padding: 2px 9px; border-radius: 20px; background: rgba(74,144,217,0.15); color: var(--accent); flex-shrink: 0; margin-left: auto }

    /* ── Layout ── */
    .portal-body { flex: 1; display: flex; overflow: hidden }
    .sidebar     { width: 300px; flex-shrink: 0; border-right: 1px solid var(--border); overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column; gap: 22px }
    .main-area   { flex: 1; overflow-y: auto; padding: 22px 24px; display: flex; flex-direction: column; gap: 22px }

    /* ── Sidebar sections ── */
    .sb-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-ter); font-weight: 400; margin-bottom: 9px }
    .sb-brief { font-size: 13px; color: var(--text-sec); line-height: 1.7; white-space: pre-line }
    .sb-dates { display: flex; gap: 20px; margin-top: 10px }
    .sb-date-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-ter); margin-bottom: 3px }
    .sb-date-val   { font-size: 13px; font-weight: 500 }

    .frameio-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 10px; background: rgba(167,139,250,0.1); border: 0.5px solid rgba(167,139,250,0.3); border-radius: 7px; color: var(--purple); font-size: 13px; font-weight: 500; text-decoration: none; transition: opacity 0.15s }
    .frameio-btn:hover { opacity: 0.8 }

    .deliv-row  { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border) }
    .deliv-row:last-child { border-bottom: none }
    .deliv-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px }
    .deliv-dot.done { background: var(--green) } .deliv-dot.pending { background: var(--text-ter) }
    .deliv-info { flex: 1; min-width: 0 }
    .deliv-text { font-size: 13px; color: var(--text) }
    .deliv-text.done { text-decoration: line-through; color: var(--text-ter) }
    .deliv-meta { font-size: 11px; color: var(--text-ter); margin-top: 2px }
    .deliv-meta.overdue { color: var(--red) } .deliv-meta.soon { color: var(--amber) }
    .deliv-link { font-size: 11px; color: var(--accent); text-decoration: none; padding: 1px 6px; border: 0.5px solid rgba(74,144,217,0.3); border-radius: 4px; flex-shrink: 0; margin-top: 3px }

    .log-entry { padding: 8px 0; border-bottom: 0.5px solid var(--border) }
    .log-entry:last-child { border-bottom: none }
    .log-note { font-size: 12px; line-height: 1.6; color: var(--text-sec); white-space: pre-line }
    .log-meta  { font-size: 10px; color: var(--text-ter); margin-top: 3px }

    .empty { font-size: 12px; color: var(--text-ter); padding: 6px 0 }
    .sb-footer { font-size: 10px; color: var(--text-ter); padding-top: 4px; margin-top: auto }

    /* ── Main area section header ── */
    .main-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-ter); font-weight: 400; margin-bottom: 12px }

    /* ── PPS date grid ── */
    .pps-wrap  { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px }
    .pps-table { border-collapse: collapse; font-size: 12px }
    .pps-table th { background: var(--surface2); border-bottom: 2px solid var(--border); white-space: nowrap }
    .pps-th-date  { padding: 8px 12px; text-align: left; font-size: 10px; font-weight: 400; color: var(--text-ter); position: sticky; left: 0; z-index: 3; border-right: 1px solid var(--border); min-width: 88px; width: 88px }
    .pps-th-phase { padding: 8px 4px; text-align: center; border-left: 1px solid var(--border); min-width: 104px; width: 104px }
    .pps-tr { border-bottom: 1px solid var(--border) }
    .pps-tr.weekend { opacity: 0.4 }
    .pps-tr.is-today { outline: 1px solid rgba(74,144,217,0.25); outline-offset: -1px }
    .pps-td-date  { padding: 3px 10px; white-space: nowrap; position: sticky; left: 0; z-index: 1; border-right: 1px solid var(--border) }
    .pps-td-empty { border-left: 1px solid var(--border) }
    .pps-td-block { border-left: 2px solid transparent; padding: 1px 5px; cursor: pointer; transition: filter 0.1s }
    .pps-td-block:hover { filter: brightness(1.2) }
    .block-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 92px }

    /* ── Key dates ── */
    .key-date-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border) }
    .key-date-row:last-child { border-bottom: none }
    .kd-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .kd-name { flex: 1; font-size: 13px }
    .kd-right { display: flex; align-items: center; gap: 7px; flex-shrink: 0 }
    .kd-date  { font-size: 12px; color: var(--text-sec) }
    .kd-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; white-space: nowrap }
    .kd-badge.today { color: var(--accent); background: rgba(74,144,217,0.12) }
    .kd-badge.soon  { color: var(--amber);  background: rgba(245,158,11,0.12) }
    .kd-badge.past  { color: var(--text-ter) }

    /* ── Block detail modal ── */
    .modal-bg  { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px }
    .modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; width: 100%; max-width: 400px; overflow: hidden }
    .modal-hdr { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border) }
    .modal-chip { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0 }
    .modal-ttl  { flex: 1; min-width: 0; font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .modal-sub  { font-size: 11px; color: var(--text-ter); margin-top: 1px }
    .modal-x    { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-ter); padding: 0 4px; line-height: 1; flex-shrink: 0 }
    .modal-x:hover { color: var(--text) }
    .modal-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 10px }
    .modal-dates { font-size: 13px; color: var(--text-sec) }
    .modal-notes { font-size: 13px; color: var(--text-sec); line-height: 1.65; white-space: pre-line }
    .modal-dl-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--red); background: rgba(239,68,68,0.1); padding: 3px 8px; border-radius: 20px }
  </style>
</head>
<body>
  <div id="root" style="flex:1;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-ter)">Loading…</div>

  <script type="module">
    const token = location.pathname.split('/portal/')[1]?.split('/')[0]
    if (!token) {
      document.body.innerHTML = `<div class="full-center"><div class="error-state"><h2>Invalid link</h2><p>This portal link is not valid.</p></div></div>`
      throw new Error('No token')
    }

    const res = await fetch(`/api/portal?token=${encodeURIComponent(token)}`)
    if (!res.ok) {
      document.body.innerHTML = `<div class="full-center"><div class="error-state"><h2>Not found</h2><p>This portal link has expired or doesn't exist.</p></div></div>`
      throw new Error('Not found')
    }

    const { project, client, studio, deliverables, workLog, ppsSchedule, ppsPhases } = await res.json()

    const esc      = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    const fmtDate  = s => s ? new Date(s).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }) : ''
    const fmtShort = s => s ? new Date(s).toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : ''
    // Extract YYYY-MM-DD from any date representation (guards against Neon returning
    // DATE columns as ISO timestamp strings, which break the +T00:00:00 concat below)
    const toYMD = s => { const m = s && String(s).match(/(\d{4}-\d{2}-\d{2})/); return m ? m[1] : null }

    function hexRgba(hex, a) {
      try {
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16)
        return `rgba(${r},${g},${b},${a})`
      } catch { return `rgba(180,140,80,${a})` }
    }

    document.title = `${project.name} — Portal`

    const today = new Date(); today.setHours(0,0,0,0)
    const clientName = client ? (client.company || client.name) : (studio?.name || '')

    // ── Sidebar ───────────────────────────────────────────────────────────────────

    const briefHTML = (project.brief || project.shoot_start) ? `
      <div>
        ${project.brief ? `<div class="sb-brief">${esc(project.brief)}</div>` : ''}
        ${project.shoot_start ? `<div class="sb-dates">
          <div><div class="sb-date-label">Shoot start</div><div class="sb-date-val">${fmtDate(project.shoot_start)}</div></div>
          ${project.shoot_end && project.shoot_end !== project.shoot_start
            ? `<div><div class="sb-date-label">Shoot end</div><div class="sb-date-val">${fmtDate(project.shoot_end)}</div></div>` : ''}
        </div>` : ''}
      </div>` : ''

    const frameHTML = project.frame_io_link ? `
      <div>
        <div class="sb-title">Review</div>
        <a href="${esc(project.frame_io_link)}" target="_blank" rel="noopener" class="frameio-btn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v2H4zm0 7h10v2H4zm0 7h7v2H4z"/></svg>
          Open in Frame.io
        </a>
      </div>` : ''

    const delivHTML = `
      <div>
        <div class="sb-title">Deliverables</div>
        ${deliverables.length ? deliverables.map(d => {
          const dueDate  = d.due ? new Date(d.due) : null
          const daysLeft = dueDate ? Math.round((dueDate - today) / 86400000) : null
          const isOverdue = !d.done && dueDate && daysLeft < 0
          const isSoon    = !d.done && dueDate && daysLeft >= 0 && daysLeft <= 3
          let meta = ''
          if (dueDate) {
            if (d.done)         meta = fmtDate(d.due)
            else if (isOverdue) meta = `⚠ ${Math.abs(daysLeft)}d overdue · ${fmtDate(d.due)}`
            else if (isSoon)    meta = `⏰ ${daysLeft === 0 ? 'Due today' : daysLeft + 'd left'} · ${fmtDate(d.due)}`
            else                meta = fmtDate(d.due)
          }
          return `<div class="deliv-row">
            <div class="deliv-dot ${d.done ? 'done' : 'pending'}"></div>
            <div class="deliv-info">
              <div class="deliv-text ${d.done ? 'done' : ''}">${esc(d.text)}</div>
              ${meta ? `<div class="deliv-meta${isOverdue ? ' overdue' : isSoon ? ' soon' : ''}">${meta}</div>` : ''}
            </div>
            ${d.link ? `<a href="${esc(d.link)}" target="_blank" rel="noopener" class="deliv-link">↗</a>` : ''}
          </div>`
        }).join('') : `<div class="empty">No deliverables listed</div>`}
      </div>`

    const logHTML = `
      <div>
        <div class="sb-title">Work log</div>
        ${workLog.length ? workLog.map(e => `
          <div class="log-entry">
            <div class="log-note">${esc(e.note)}</div>
            <div class="log-meta">${fmtDate(e.entry_date)}${e.created_by ? ' · ' + esc(e.created_by) : ''}</div>
          </div>`).join('') : `<div class="empty">No updates yet</div>`}
      </div>`

    const footerHTML = `<div class="sb-footer">Powered by Slate${studio?.website
      ? ` · <a href="${esc(studio.website)}" style="color:inherit">${esc(studio.website)}</a>` : ''}</div>`

    // ── PPS grid ──────────────────────────────────────────────────────────────────

    const blockDataMap = {}  // id → block data (populated while building grid)
    let ppsGridHTML  = ''
    let keyDatesHTML = ''

    if (ppsPhases && ppsPhases.length) {
      const allBlocks = ppsPhases.flatMap(ph => (ph.blocks || []).map(b => ({ ...b, _phId: ph.id, _phName: ph.name, _phColor: ph.color })))

      // Date range: prefer schedule bounds, fall back to block extents
      const allDateStrs = allBlocks.flatMap(b => [toYMD(b.start_date), toYMD(b.end_date)]).filter(Boolean)
      const gridStartStr = toYMD(ppsSchedule?.start_date) || (allDateStrs.length ? allDateStrs.reduce((a,b) => a < b ? a : b) : null)
      const gridEndStr   = toYMD(ppsSchedule?.end_date)   || (allDateStrs.length ? allDateStrs.reduce((a,b) => a > b ? a : b) : null)

      if (gridStartStr && gridEndStr) {
        const start = new Date(gridStartStr + 'T00:00:00')
        const end   = new Date(gridEndStr   + 'T00:00:00')
        const days  = []
        for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d))

        if (days.length <= 400) {
          const DOW    = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
          const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December']

          // Per-phase dayBlock maps
          const phaseData = ppsPhases.map(ph => {
            const dayBlock = {}
            for (const b of (ph.blocks || [])) {
              const bs = new Date((toYMD(b.start_date) || '') + 'T00:00:00')
              const be = new Date((toYMD(b.end_date)   || '') + 'T00:00:00')
              if (be < bs) continue
              for (let d = new Date(bs); d <= be; d.setDate(d.getDate() + 1)) {
                const ds = d.toISOString().slice(0,10)
                if (!dayBlock[ds]) dayBlock[ds] = b
              }
            }
            const firstByBlock = {}, lastByBlock = {}
            for (const d of days) {
              const ds = d.toISOString().slice(0,10)
              const b = dayBlock[ds]
              if (b) { if (!firstByBlock[b.id]) firstByBlock[b.id] = ds; lastByBlock[b.id] = ds }
            }
            return { dayBlock, firstByBlock, lastByBlock }
          })

          // Build row HTML
          let rowsHTML  = ''
          let lastMonth = -1
          for (const d of days) {
            const ds         = d.toISOString().slice(0,10)
            const isWeekend  = d.getDay() === 0 || d.getDay() === 6
            const isTod      = d.getTime() === today.getTime()
            const newMonth   = d.getMonth() !== lastMonth
            lastMonth = d.getMonth()

            const monthLabel = newMonth
              ? `<div style="font-size:9px;color:var(--text-ter);text-transform:uppercase;letter-spacing:0.4px;margin-top:1px">${MONTHS[d.getMonth()]} ${d.getFullYear()}</div>`
              : ''

            const dateBg = isTod ? 'rgba(74,144,217,0.08)' : isWeekend ? 'var(--surface2)' : 'var(--bg)'

            let cellsHTML = ''
            for (let pi = 0; pi < ppsPhases.length; pi++) {
              const ph = ppsPhases[pi]
              const { dayBlock, firstByBlock, lastByBlock } = phaseData[pi]
              const block = dayBlock[ds]
              if (!block) {
                cellsHTML += `<td class="pps-td-empty"></td>`
                continue
              }
              const isFirst = firstByBlock[block.id] === ds
              const isLast  = lastByBlock[block.id]  === ds
              const color   = block.color || ph.color || '#C47E3A'
              const bg      = hexRgba(color, 0.2)
              const border  = hexRgba(color, 0.55)
              blockDataMap[block.id] = { ...block, phase_name: ph.name, phase_color: ph.color }
              cellsHTML += `<td class="pps-td-block" data-bid="${esc(block.id)}"
                style="background:${bg};border-left-color:${border};${isFirst ? `border-top:2px solid ${border};` : ''}${isLast ? `border-bottom:2px solid ${border};` : ''}">
                ${isFirst && block.title ? `<div class="block-label" style="color:${color}">${esc(block.title)}</div>` : ''}
              </td>`
            }

            rowsHTML += `<tr class="pps-tr${isWeekend ? ' weekend' : ''}${isTod ? ' is-today' : ''}">
              <td class="pps-td-date" style="background:${dateBg}">
                <div style="display:flex;align-items:baseline;gap:5px">
                  <span style="font-size:10px;color:var(--text-ter);width:24px;flex-shrink:0">${DOW[d.getDay()]}</span>
                  <span style="font-size:11px;${isTod ? 'color:var(--accent);font-weight:700' : 'color:var(--text-sec)'}">${d.getDate()}</span>
                </div>
                ${monthLabel}
              </td>
              ${cellsHTML}
            </tr>`
          }

          const phaseHeaders = ppsPhases.map(ph => `
            <th class="pps-th-phase">
              <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
                <div style="width:8px;height:8px;border-radius:50%;background:${ph.color || '#C47E3A'}"></div>
                <div style="font-size:10px;font-weight:600;color:var(--text-sec);text-transform:uppercase;letter-spacing:0.3px;overflow:hidden;text-overflow:ellipsis;max-width:92px;white-space:nowrap">${esc(ph.name)}</div>
              </div>
            </th>`).join('')

          ppsGridHTML = `
            <div>
              <div class="main-title">Post Production Schedule</div>
              <div class="pps-wrap">
                <table class="pps-table">
                  <thead><tr>
                    <th class="pps-th-date">Date</th>
                    ${phaseHeaders}
                  </tr></thead>
                  <tbody>${rowsHTML}</tbody>
                </table>
              </div>
            </div>`

        } else {
          ppsGridHTML = `<div><div class="main-title">Post Production Schedule</div>
            <p style="font-size:13px;color:var(--text-sec)">Schedule spans too many days to display as a grid.</p></div>`
        }
      } else if (ppsPhases.length) {
        ppsGridHTML = `
          <div>
            <div class="main-title">Post Production Schedule</div>
            <div style="display:flex;flex-wrap:wrap;gap:8px">
              ${ppsPhases.map(ph => `<div style="display:flex;align-items:center;gap:6px;padding:6px 12px;border:1px solid var(--border);border-radius:6px;font-size:13px">
                <div style="width:8px;height:8px;border-radius:50%;background:${ph.color || '#C47E3A'}"></div>
                ${esc(ph.name)}
              </div>`).join('')}
            </div>
          </div>`
      }

      // ── Key dates ───────────────────────────────────────────────────────────────
      const deadlines = allBlocks.filter(b => b.is_deadline && b.start_date)
        .sort((a, b) => a.start_date < b.start_date ? -1 : 1)

      if (deadlines.length) {
        const rowsKD = deadlines.map(b => {
          const d        = new Date(b.start_date)
          const daysAway = Math.round((d - today) / 86400000)
          const isPast   = daysAway < 0
          const isToday  = daysAway === 0
          const isSoon   = !isPast && !isToday && daysAway <= 7
          const dotColor = b.color || b._phColor || '#C47E3A'
          let badge = ''
          if (isToday)     badge = `<span class="kd-badge today">Today</span>`
          else if (isSoon) badge = `<span class="kd-badge soon">${daysAway}d away</span>`
          else if (isPast) badge = `<span class="kd-badge past">Passed</span>`
          return `<div class="key-date-row">
            <div class="kd-dot" style="background:${dotColor}"></div>
            <div class="kd-name" style="color:${isPast ? 'var(--text-ter)' : 'var(--text)'}">${esc(b.title || b._phName)}</div>
            <div class="kd-right">
              <span class="kd-date">${fmtShort(b.start_date)}</span>
              ${badge}
            </div>
          </div>`
        }).join('')

        keyDatesHTML = `
          <div>
            <div class="main-title">Key Dates</div>
            <div style="border:1px solid var(--border);border-radius:8px;padding:4px 14px">${rowsKD}</div>
          </div>`
      }
    }

    // ── Render page ───────────────────────────────────────────────────────────────

    document.body.innerHTML = `
      <header class="portal-header">
        <img src="/slate-logo-white.png" alt="Slate" class="portal-logo" onerror="this.style.display='none'" />
        <div class="hdr-sep"></div>
        <div class="hdr-project">${esc(project.name)}</div>
        ${clientName ? `<div class="hdr-client">${esc(clientName)}</div>` : ''}
        <div class="hdr-status">${esc(project.status)}</div>
      </header>
      <div class="portal-body">
        <aside class="sidebar">
          ${briefHTML}
          ${frameHTML}
          ${delivHTML}
          ${logHTML}
          ${footerHTML}
        </aside>
        <main class="main-area">
          ${ppsGridHTML || `<div style="font-size:13px;color:var(--text-ter)">No post production schedule set up yet.</div>`}
          ${keyDatesHTML}
        </main>
      </div>`

    // ── Block detail modal ────────────────────────────────────────────────────────

    function showBlockDetail(b) {
      document.getElementById('pps-modal')?.remove()
      const color = b.color || b.phase_color || '#C47E3A'
      const modal = document.createElement('div')
      modal.id = 'pps-modal'
      modal.className = 'modal-bg'
      const days = b.start_date && b.end_date
        ? Math.round((new Date(b.end_date) - new Date(b.start_date)) / 86400000) + 1
        : null
      modal.innerHTML = `
        <div class="modal-box" id="pps-modal-box">
          <div class="modal-hdr">
            <div class="modal-chip" style="background:${esc(color)}"></div>
            <div style="flex:1;min-width:0">
              <div class="modal-ttl">${esc(b.title || b.phase_name)}</div>
              ${b.phase_name ? `<div class="modal-sub">${esc(b.phase_name)}</div>` : ''}
            </div>
            <button class="modal-x" id="pps-modal-x">×</button>
          </div>
          <div class="modal-body">
            <div class="modal-dates">${fmtShort(b.start_date)}${b.end_date && b.end_date !== b.start_date ? ` → ${fmtShort(b.end_date)}` : ''}${days && days > 1 ? `<span style="color:var(--text-ter);margin-left:6px">${days}d</span>` : ''}</div>
            ${b.notes ? `<div class="modal-notes">${esc(b.notes)}</div>` : ''}
            ${b.is_deadline ? `<div><span class="modal-dl-tag">⚑ Deadline</span></div>` : ''}
          </div>
        </div>`
      modal.addEventListener('click', e => { if (!e.target.closest('#pps-modal-box')) modal.remove() })
      modal.querySelector('#pps-modal-x').addEventListener('click', () => modal.remove())
      document.body.appendChild(modal)
    }

    document.querySelectorAll('.pps-td-block').forEach(td => {
      td.addEventListener('click', () => {
        const b = blockDataMap[td.dataset.bid]
        if (b) showBlockDetail(b)
      })
    })

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('pps-modal')?.remove()
    })
  </script>
</body>
</html>
