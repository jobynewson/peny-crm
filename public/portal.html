<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Portal — Slate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
      --border: #2a2a2a; --text: #e8e8e4; --text-sec: #9a9a90; --text-ter: #5a5a54;
      --accent: #4a90d9; --green: #6ec96e; --amber: #f59e0b; --purple: #a78bfa;
      --radius: 10px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font); min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:32px 16px 80px }
    .logo { height:32px; margin-bottom:32px; opacity:0.9 }
    .wrap { width:100%; max-width:700px; display:flex; flex-direction:column; gap:14px }
    .card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--radius); padding:24px }
    .project-name { font-size:22px; font-weight:600; margin-bottom:4px }
    .project-sub { font-size:13px; color:var(--text-sec); margin-bottom:16px }
    .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:500; background:rgba(74,144,217,0.15); color:var(--accent); margin-bottom:16px }
    .brief { font-size:13px; color:var(--text-sec); line-height:1.7; white-space:pre-line }
    .dates { display:flex; gap:24px; margin-top:16px }
    .date-item { }
    .date-label { font-size:10px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-ter); margin-bottom:3px }
    .date-val { font-size:14px; font-weight:500 }

    .section-title { font-size:11px; text-transform:uppercase; letter-spacing:0.6px; color:var(--text-ter); margin-bottom:14px; font-weight:400 }

    .deliv-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:0.5px solid var(--border); font-size:14px; flex-wrap:wrap }
    .deliv-row:last-child { border-bottom:none }
    .deliv-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0 }
    .deliv-dot.done { background:var(--green) }
    .deliv-dot.pending { background:var(--border) }
    .deliv-text { flex:1; min-width:0 }
    .deliv-text.done { text-decoration:line-through; color:var(--text-ter) }
    .deliv-due { font-size:11px; white-space:nowrap; flex-shrink:0; padding:2px 7px; border-radius:20px; font-weight:500 }
    .deliv-due.overdue { background:rgba(239,68,68,0.15); color:#ef4444 }
    .deliv-due.soon { background:rgba(245,158,11,0.15); color:var(--amber) }
    .deliv-due.normal { color:var(--text-ter); font-weight:400 }
    .deliv-due.done-date { color:var(--text-ter); font-weight:400 }
    .deliv-link { font-size:12px; color:var(--accent); text-decoration:none; padding:2px 8px; border:0.5px solid rgba(74,144,217,0.35); border-radius:5px; white-space:nowrap; flex-shrink:0 }
    .deliv-link:hover { opacity:0.75 }

    .log-entry { padding:12px 0; border-bottom:0.5px solid var(--border) }
    .log-entry:last-child { border-bottom:none }
    .log-note { font-size:13px; line-height:1.6; white-space:pre-line }
    .log-meta { font-size:11px; color:var(--text-ter); margin-top:4px }

    .frameio-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:12px; background:rgba(167,139,250,0.12); border:0.5px solid rgba(167,139,250,0.3); border-radius:8px; color:var(--purple); font-size:14px; font-weight:500; cursor:pointer; text-decoration:none; font-family:var(--font); transition:opacity 0.15s }
    .frameio-btn:hover { opacity:0.8 }
    .frameio-icon { width:18px; height:18px; opacity:0.8 }

    .empty { font-size:13px; color:var(--text-ter); text-align:center; padding:20px 0 }
    .loading { color:var(--text-ter); font-size:14px; text-align:center; padding:60px }
    .error-state { text-align:center; padding:60px 20px }
    .error-state h2 { font-size:18px; margin-bottom:8px }
    .error-state p { color:var(--text-sec); font-size:14px }
    .footer { margin-top:32px; font-size:11px; color:var(--text-ter); text-align:center }

  </style>
</head>
<body>
  <img src="/slate-logo-white.png" alt="Slate" class="logo" onerror="this.style.display='none'" />
  <div id="root"><div class="loading">Loading…</div></div>

  <script type="module">
    const token = location.pathname.split('/portal/')[1]?.split('/')[0]
    if (!token) {
      document.getElementById('root').innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This portal link is not valid.</p></div>`
      throw new Error('No token')
    }

    const res = await fetch(`/api/portal?token=${encodeURIComponent(token)}`)
    if (!res.ok) {
      document.getElementById('root').innerHTML = `<div class="error-state"><h2>Not found</h2><p>This portal link has expired or doesn't exist.</p></div>`
      throw new Error('Not found')
    }

    const { project, client, studio, deliverables, workLog, ppsPhases } = await res.json()

    const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')

    const fmtDate = s => {
      if (!s) return ''
      const d = new Date(s)
      return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
    }

    // Update page title
    document.title = `${project.name} — Portal`

    const today = new Date(); today.setHours(0,0,0,0)
    const delivHTML = deliverables.length
      ? deliverables.map(d => {
          const dueDate = d.due ? new Date(d.due) : null
          const daysLeft = dueDate ? Math.round((dueDate - today) / 86400000) : null
          const isOverdue = !d.done && dueDate && daysLeft < 0
          const isDueSoon = !d.done && dueDate && daysLeft >= 0 && daysLeft <= 3
          let dueHTML = ''
          if (dueDate) {
            if (d.done) {
              dueHTML = `<span class="deliv-due done-date">${fmtDate(d.due)}</span>`
            } else if (isOverdue) {
              dueHTML = `<span class="deliv-due overdue">⚠ ${Math.abs(daysLeft)}d overdue · ${fmtDate(d.due)}</span>`
            } else if (isDueSoon) {
              dueHTML = `<span class="deliv-due soon">⏰ ${daysLeft === 0 ? 'due today' : daysLeft + 'd left'} · ${fmtDate(d.due)}</span>`
            } else {
              dueHTML = `<span class="deliv-due normal">${fmtDate(d.due)}</span>`
            }
          }
          const linkHTML = d.link ? `<a href="${esc(d.link)}" target="_blank" rel="noopener" class="deliv-link">↗ Link</a>` : ''
          return `
          <div class="deliv-row${isOverdue?' style="background:rgba(239,68,68,0.05);border-radius:6px;padding:10px 8px"':''}">
            <div class="deliv-dot ${d.done?'done':'pending'}"></div>
            <div class="deliv-text ${d.done?'done':''}">${esc(d.text)}</div>
            ${dueHTML}${linkHTML}
          </div>`
        }).join('')
      : `<div class="empty">No deliverables listed</div>`

    const logHTML = workLog.length
      ? workLog.map(e => `
        <div class="log-entry">
          <div class="log-note">${esc(e.note)}</div>
          <div class="log-meta">${fmtDate(e.entry_date)}${e.created_by ? ' · ' + esc(e.created_by) : ''}</div>
        </div>`).join('')
      : `<div class="empty">No updates yet</div>`

    let ppsHTML = ''
    if (ppsPhases && ppsPhases.length) {
      const withDates = ppsPhases.filter(ph => ph.start_date && ph.end_date)
      const fmtS = d => new Date(d).toLocaleDateString('en-GB', { day:'numeric', month:'short' })
      let ganttHTML = ''
      if (withDates.length) {
        const allMs = withDates.flatMap(ph => [new Date(ph.start_date).getTime(), new Date(ph.end_date).getTime()])
        const minMs = Math.min(...allMs)
        const maxMs = Math.max(...allMs)
        const totalMs = maxMs - minMs || 1
        const today = new Date(); today.setHours(0,0,0,0)
        const todayPct = ((today.getTime() - minMs) / totalMs * 100).toFixed(1)
        const showToday = today.getTime() >= minMs && today.getTime() <= maxMs

        // Month boundary markers for column grid lines
        const monthMarkers = []
        const mCursor = new Date(minMs); mCursor.setDate(1); mCursor.setHours(0,0,0,0)
        while (mCursor.getTime() <= maxMs) {
          const pct = (mCursor.getTime() - minMs) / totalMs * 100
          if (pct >= 0 && pct <= 100)
            monthMarkers.push({ pct: pct.toFixed(1), label: mCursor.toLocaleDateString('en-GB', { month: 'short' }) })
          mCursor.setMonth(mCursor.getMonth() + 1)
        }

        ganttHTML = `
          <div style="background:var(--surface2);border-radius:8px;padding:16px;overflow-x:auto">
            <div style="min-width:420px">
              <div style="display:flex">
                <div style="flex:0 0 140px">
                  <div style="height:24px"></div>
                  ${withDates.map((ph, i) => `
                    <div style="height:32px;display:flex;flex-direction:column;justify-content:center;padding-right:10px${i < withDates.length-1 ? ';margin-bottom:6px' : ''}">
                      <div style="font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">${esc(ph.name)}</div>
                      <div style="font-size:10px;color:var(--text-ter);margin-top:1px;white-space:nowrap">${fmtS(ph.start_date)} – ${fmtS(ph.end_date)}</div>
                    </div>
                  `).join('')}
                </div>
                <div style="flex:1;min-width:0">
                  <div style="position:relative;height:24px">
                    ${monthMarkers.map(m => `<span style="position:absolute;left:${m.pct}%;transform:translateX(-50%);font-size:10px;font-weight:500;color:var(--text-ter);text-transform:uppercase;letter-spacing:0.3px;white-space:nowrap;top:4px">${m.label}</span>`).join('')}
                  </div>
                  <div style="position:relative">
                    ${monthMarkers.map(m => `<div style="position:absolute;top:0;bottom:0;left:${m.pct}%;width:1px;background:rgba(255,255,255,0.06);pointer-events:none"></div>`).join('')}
                    ${showToday ? `<div style="position:absolute;top:0;bottom:0;left:${todayPct}%;width:2px;background:rgba(74,144,217,0.5);z-index:3;pointer-events:none"><span style="position:absolute;top:0;left:3px;font-size:9px;font-weight:600;color:var(--accent);white-space:nowrap;background:var(--surface2);padding:1px 3px;border-radius:3px;line-height:1.5">Today</span></div>` : ''}
                    ${withDates.map((ph, i) => {
                      const startMs = new Date(ph.start_date).getTime()
                      const endMs = new Date(ph.end_date).getTime()
                      const l = ((startMs - minMs) / totalMs * 100).toFixed(1)
                      const w = Math.max(1, (endMs - startMs) / totalMs * 100).toFixed(1)
                      const days = Math.round((endMs - startMs) / 86400000) + 1
                      return `<div style="height:32px;position:relative${i < withDates.length-1 ? ';margin-bottom:6px' : ''}">
                        <div style="position:absolute;top:2px;height:28px;left:${l}%;width:${w}%;min-width:4px;border-radius:5px;background:${ph.color || '#C47E3A'};display:flex;align-items:center;padding:0 8px;overflow:hidden;z-index:2;cursor:default" title="${esc(ph.name)}: ${fmtS(ph.start_date)} – ${fmtS(ph.end_date)} (${days}d)">
                          <div style="display:flex;align-items:baseline;gap:5px;overflow:hidden;min-width:0">
                            <span style="font-size:11px;font-weight:500;color:rgba(255,255,255,0.95);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(ph.name)}</span>
                            <span style="font-size:9px;color:rgba(255,255,255,0.55);flex-shrink:0;white-space:nowrap">${days}d</span>
                          </div>
                        </div>
                      </div>`
                    }).join('')}
                  </div>
                  <div style="display:flex;justify-content:space-between;margin-top:10px;padding-top:8px;border-top:0.5px solid var(--border)">
                    <span style="font-size:10px;color:var(--text-ter)">${fmtS(minMs)}</span>
                    <span style="font-size:10px;color:var(--text-ter)">${fmtS(maxMs)}</span>
                  </div>
                </div>
              </div>
            </div>
          </div>`
      }
      const deadlines = ppsPhases.filter(ph => ph.is_deadline && ph.start_date)
      const deadlinesHTML = deadlines.length ? `
        <div style="margin-top:20px;padding-top:18px;border-top:0.5px solid var(--border)">
          <div class="section-title" style="margin-bottom:10px">Key Dates</div>
          ${deadlines.map((ph, i) => {
            const d = new Date(ph.start_date)
            const daysAway = Math.round((d - today) / 86400000)
            const isPast = daysAway < 0
            const isToday = daysAway === 0
            const isSoon = daysAway > 0 && daysAway <= 7
            let badge = ''
            if (isToday)       badge = `<span style="font-size:10px;font-weight:600;color:var(--accent);background:rgba(74,144,217,0.12);padding:2px 7px;border-radius:20px;flex-shrink:0">Today</span>`
            else if (isSoon)   badge = `<span style="font-size:10px;font-weight:600;color:var(--amber);background:rgba(245,158,11,0.12);padding:2px 7px;border-radius:20px;flex-shrink:0">${daysAway}d away</span>`
            else if (isPast)   badge = `<span style="font-size:10px;color:var(--text-ter);padding:2px 7px;flex-shrink:0">${fmtS(ph.start_date)}</span>`
            else               badge = `<span style="font-size:10px;color:var(--text-ter);padding:2px 7px;flex-shrink:0">${fmtS(ph.start_date)}</span>`
            return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)${i === deadlines.length-1 ? ';border-bottom:none' : ''}">
              <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${ph.color || '#C47E3A'}"></div>
              <span style="flex:1;font-size:13px;color:${isPast ? 'var(--text-ter)' : 'var(--text)'}">${esc(ph.name)}</span>
              ${badge}
            </div>`
          }).join('')}
        </div>` : ''

      ppsHTML = `
        <div class="card">
          <div class="section-title">Post Production Schedule</div>
          ${ganttHTML}
          ${!withDates.length ? `<div style="font-size:13px;color:var(--text-sec)">
            ${ppsPhases.map(ph => `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--border)">
              <div style="width:10px;height:10px;border-radius:50%;flex-shrink:0;background:${ph.color || '#C47E3A'}"></div>
              <span>${esc(ph.name)}</span>
            </div>`).join('')}
          </div>` : ''}
          ${deadlinesHTML}
        </div>`
    }

    document.getElementById('root').innerHTML = `
      <div class="wrap">
        <div class="card">
          <div class="project-name">${esc(project.name)}</div>
          <div class="project-sub">${client ? esc(client.company || client.name) : studio?.name ? esc(studio.name) : ''}</div>
          <div class="status-badge">${esc(project.status)}</div>
          ${project.brief ? `<div class="brief">${esc(project.brief)}</div>` : ''}
          ${project.shoot_start ? `
          <div class="dates">
            <div class="date-item">
              <div class="date-label">Shoot start</div>
              <div class="date-val">${fmtDate(project.shoot_start)}</div>
            </div>
            ${project.shoot_end && project.shoot_end !== project.shoot_start ? `
            <div class="date-item">
              <div class="date-label">Shoot end</div>
              <div class="date-val">${fmtDate(project.shoot_end)}</div>
            </div>` : ''}
          </div>` : ''}
        </div>

        ${project.frame_io_link ? `
        <div class="card">
          <div class="section-title">Review &amp; Feedback</div>
          <a href="${esc(project.frame_io_link)}" target="_blank" rel="noopener" class="frameio-btn">
            <svg class="frameio-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v2H4zm0 7h10v2H4zm0 7h7v2H4z"/></svg>
            Open in Frame.io
          </a>
        </div>` : ''}

        ${ppsHTML}

        <div class="card">
          <div class="section-title">Deliverables</div>
          ${delivHTML}
        </div>

        <div class="card">
          <div class="section-title">Work log</div>
          ${logHTML}
        </div>

        <div class="footer">Powered by Slate${studio?.website ? ` · <a href="${esc(studio.website)}" style="color:inherit">${esc(studio.website)}</a>` : ''}</div>
      </div>`
  </script>
</body>
</html>
