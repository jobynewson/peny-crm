<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studio Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    :root {
      --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --surface3: #2c2c2c;
      --border: #2a2a2a; --border2: #353535; --border-strong: #555;
      --text: #e8e8e4; --text-sec: #9a9a90; --text-ter: #5a5a54;
      --accent: #4a90d9; --green: #4CAF50; --amber: #f59e0b; --purple: #a78bfa;
      --post: #C47E3A; --leave: #0891b2; --red: #ef4444;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    html, body { height: 100% }
    body { background: var(--bg); color: var(--text); font-family: var(--font); display: flex; flex-direction: column; overflow: hidden }

    .full-center { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-ter); text-align: center }
    .error-state h2 { font-size: 26px; margin-bottom: 10px }
    .error-state p { color: var(--text-sec); font-size: 16px }

    /* ── Header ─────────────────────────────────────────────────────── */
    .hdr { flex-shrink: 0; display: flex; align-items: center; gap: 14px; padding: 0 24px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border) }
    .hdr-logo { height: 24px; opacity: 0.9 }
    .hdr-sep { width: 1px; height: 22px; background: var(--border2); flex-shrink: 0 }
    .hdr-co { font-size: 17px; font-weight: 600 }
    .hdr-right { margin-left: auto; display: flex; align-items: baseline; gap: 14px }
    .hdr-date { font-size: 14px; color: var(--text-sec) }
    .hdr-clock { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.5px }
    .hdr-stale { font-size: 11px; color: var(--amber) }

    /* ── Days-since: exact match to app (src/style.css) ─────────────── */
    #ds-widget-wrap { display: flex; justify-content: center; padding: 10px 16px }
    .ds-widget { display: inline-flex; align-items: baseline; gap: 6px; padding: 6px 18px; background: #c0392b; color: #fff; border-radius: 999px }
    .ds-days  { font-size: 18px; font-weight: 700; line-height: 1; color: #fff }
    .ds-label { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9) }
    .ds-name  { font-weight: 700; color: #fff }

    /* ── Countdown: exact match to app (src/app.js inlined styles) ──── */
    #cd-widget-wrap { padding: 0 24px 16px }
    .cd-widget { background: var(--surface); border: 1px solid var(--border2); border-radius: 10px; padding: 28px 24px 24px; text-align: center; position: relative; overflow: hidden }
    .cd-name  { font-size: 12px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 16px }
    .cd-units { display: flex; align-items: center; justify-content: center; gap: 4px }
    .cd-unit  { display: flex; flex-direction: column; align-items: center; min-width: 52px }
    .cd-num   { font-size: 54px; font-weight: 700; letter-spacing: -2px; color: var(--text); line-height: 1; font-variant-numeric: tabular-nums }
    .cd-lbl   { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-ter); font-weight: 600 }
    .cd-sep   { font-size: 42px; font-weight: 300; color: var(--border-strong); line-height: 1; padding-bottom: 14px; user-select: none }
    .cd-widget--celebrate { border-color: transparent !important; color: #fff }
    .cd-widget--celebrate .cd-name { color: rgba(255,255,255,0.75) }
    .cd-celebrate-body { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 0 }
    .cd-done-msg { font-size: 34px; font-weight: 700; color: #fff; animation: cd-pulse 1.4s ease-in-out infinite alternate; text-shadow: 0 0 24px rgba(255,220,80,0.7); letter-spacing: -0.5px }
    .cd-done-sub { font-size: 13px; color: rgba(255,255,255,0.65); letter-spacing: 0.3px }
    .cd-confetti-layer { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 9999 }
    .cd-confetti-piece { position: absolute; top: -14px; border-radius: 2px; animation: cd-fall linear forwards }
    @keyframes cd-bg-shift {
      0%   { background: linear-gradient(135deg,#1a0533 0%,#0a1a3d 50%,#001a10 100%) }
      25%  { background: linear-gradient(135deg,#1a2800 0%,#3d1500 50%,#001a3d 100%) }
      50%  { background: linear-gradient(135deg,#001a3d 0%,#1a0533 50%,#1a2800 100%) }
      75%  { background: linear-gradient(135deg,#3d1500 0%,#001a10 50%,#1a0533 100%) }
      100% { background: linear-gradient(135deg,#0a1a3d 0%,#1a2800 50%,#3d0a1a 100%) }
    }
    @keyframes cd-pulse { 0% { transform:scale(1);opacity:0.9 } 100% { transform:scale(1.07);opacity:1 } }
    @keyframes cd-fall  { 0% { transform:translateY(0) rotate(0deg);opacity:1 } 100% { transform:translateY(110vh) rotate(720deg);opacity:0 } }

    /* ── Body ───────────────────────────────────────────────────────── */
    .body { flex: 1; display: grid; grid-template-columns: 58% 42%; overflow: hidden }

    /* ── Section header — mirrors .db-section-head ──────────────────── */
    .sec-hd { display: flex; align-items: center; gap: 8px; padding: 12px 18px 10px; flex-shrink: 0; border-bottom: 1px solid var(--border) }
    .sec-hd-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-sec) }
    .sec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .sec-count { font-size: 11px; color: var(--text-ter); background: var(--surface2); border-radius: 20px; padding: 1px 8px; margin-left: auto }
    .sec-cap { font-size: 11px; color: var(--text-ter); margin-left: auto }
    .sec-body { flex: 1; overflow-y: auto; padding: 0 18px }
    .sec-body::-webkit-scrollbar { width: 6px }
    .sec-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px }

    /* ── Left panel: Team Calendar ──────────────────────────────────── */
    .cal-panel { border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden }
    .cal-week-lbl { font-size: 11px; color: var(--text-ter) }
    .cal-body { flex: 1; overflow: auto; padding: 10px 14px }
    .cal-body::-webkit-scrollbar { width: 6px; height: 6px }
    .cal-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px }

    /* Table: same structure as _renderGrid in team-calendar.js */
    .tc-table { width: 100%; border-collapse: collapse; font-size: 12px }
    .tc-table thead tr { background: var(--surface2) }
    .tc-table th { padding: 8px 10px; text-align: left; font-weight: 500; font-size: 11px; color: var(--text-ter); border-right: 1px solid var(--border); white-space: nowrap }
    .tc-table th.col-user { color: var(--text-sec) }
    .tc-tr { border-top: 1px solid var(--border) }
    .tc-tr.today  { background: rgba(74,144,217,0.06) }
    .tc-tr.weekend { background: var(--surface2) }
    .tc-td-date { padding: 7px 10px; border-right: 1px solid var(--border); vertical-align: middle; white-space: nowrap; color: var(--text-sec); min-width: 110px }
    .tc-td-date.today { font-weight: 600; color: var(--accent) }
    .tc-td-date.weekend { color: var(--text-ter) }
    .tc-today-badge { font-size: 9px; background: var(--accent); color: #fff; border-radius: 3px; padding: 1px 4px; vertical-align: middle; margin-left: 3px }
    .tc-td-user { padding: 5px 8px; border-right: 1px solid var(--border); vertical-align: top; min-width: 140px }
    .tc-chip { display: flex; align-items: center; gap: 5px; padding: 3px 7px; border-radius: 3px; margin: 2px 0; overflow: hidden }
    .tc-chip-label { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1 }
    .tc-chip-dl { font-size: 9px; font-weight: 700; color: var(--red); flex-shrink: 0 }
    .tc-hol { font-size: 10px; color: var(--amber); padding: 3px 7px; border-radius: 3px }

    /* ── Right panel ─────────────────────────────────────────────────── */
    .right-panel { display: grid; grid-template-rows: 1fr 1fr; overflow: hidden }
    .right-top { border-bottom: 1px solid var(--border); display: grid; grid-template-rows: 1fr 1fr; overflow: hidden }
    .right-bottom { display: grid; grid-template-rows: 1fr 1fr; overflow: hidden }

    /* Shared section wrapper */
    .sec { display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid var(--border) }
    .sec:last-child { border-bottom: none }

    /* ── Deliverables ─────────────────────────────────────────────── */
    .deliv-row { display: flex; align-items: flex-start; gap: 8px; padding: 7px 0; border-bottom: 0.5px solid var(--border) }
    .deliv-row:last-child { border-bottom: none }
    .deliv-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px }
    .deliv-info { flex: 1; min-width: 0 }
    .deliv-text { font-size: 13px; line-height: 1.3 }
    .deliv-proj { font-size: 11px; color: var(--text-ter); margin-top: 2px }
    .deliv-due  { font-size: 11px; flex-shrink: 0; text-align: right }
    .due-overdue { color: var(--red); font-weight: 600 }
    .due-soon    { color: var(--amber); font-weight: 600 }
    .due-ok      { color: var(--text-ter) }

    /* ── Live Projects ────────────────────────────────────────────── */
    .proj-row { display: flex; align-items: center; gap: 9px; padding: 7px 0; border-bottom: 0.5px solid var(--border) }
    .proj-row:last-child { border-bottom: none }
    .proj-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.3) }
    .proj-info { flex: 1; min-width: 0 }
    .proj-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .proj-client { font-size: 11px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .proj-stage { font-size: 10px; color: var(--text-ter); flex-shrink: 0 }

    /* ── Hours: mimic retainer kanban-card from dashboard ────────── */
    .hours-total { display: flex; align-items: baseline; gap: 8px; padding: 10px 0 8px }
    .hours-num  { font-size: 32px; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1 }
    .hours-unit { font-size: 13px; color: var(--text-sec) }
    .hours-cap  { font-size: 12px; color: var(--text-ter); margin-left: auto }
    .bar-row  { padding: 5px 0 }
    .bar-hd   { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px }
    .bar-name { font-size: 12px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
    .bar-val  { font-size: 11px; color: var(--text-sec); flex-shrink: 0; font-variant-numeric: tabular-nums }
    .bar-track { height: 6px; background: var(--surface3); border-radius: 4px; overflow: hidden }
    .bar-fill  { height: 100%; border-radius: 4px; transition: width 0.4s }

    /* ── Retainer cards: mimic .kanban-card with purple left border ── */
    .ret-card { border: 1px solid var(--border); border-left: 3px solid #a78bfa; border-radius: 6px; padding: 10px 12px; margin: 6px 0 }
    .ret-card-title { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
    .ret-card-client { font-size: 11px; color: var(--text-sec); margin-top: 2px }
    .ret-bar-lbl { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 3px; margin-top: 7px }
    .ret-bar-lbl-l { color: var(--text-ter) }
    .ret-bar-lbl-r { color: var(--text-sec); font-variant-numeric: tabular-nums }
    .ret-alert { font-size: 10px; margin-top: 4px }

    .empty { font-size: 13px; color: var(--text-ter); padding: 8px 0 }
  </style>
</head>
<body>
  <div id="root" class="full-center">Loading…</div>

  <script type="module">
    const fromPath = location.pathname.split('/dashboard/')[1]?.split('/')[0]
    const token = fromPath || new URLSearchParams(location.search).get('token')
    const REFRESH_MS = 3 * 60 * 1000

    const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    const DOW   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    const DOWF  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday']
    const MONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']

    const parseDay  = s => s ? new Date(s + 'T00:00:00') : null
    const isoDate   = dt => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`
    const fmtShort  = s => { const d = parseDay(s); return d ? `${d.getDate()} ${MONTH[d.getMonth()]}` : '' }
    const pad       = n => String(n).padStart(2, '0')

    const root = document.getElementById('root')

    if (!token) {
      root.innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This dashboard link is not valid.</p></div>`
      throw new Error('No token')
    }

    // ── Countdown state (module-level so tick survives re-renders) ──
    let cdTarget = null, cdName = '', cdCelebrated = false
    let confettiRunning = false

    function startConfetti() {
      if (confettiRunning) return
      confettiRunning = true
      document.getElementById('cd-confetti-layer')?.remove()
      const layer = document.createElement('div')
      layer.id = 'cd-confetti-layer'; layer.className = 'cd-confetti-layer'
      document.body.appendChild(layer)
      const COLORS = ['#f59e0b','#ef4444','#10b981','#3b82f6','#8b5cf6','#ec4899','#f97316','#06b6d4','#fbbf24','#a3e635']
      const spawn = () => {
        if (!document.contains(layer)) { clearInterval(t); confettiRunning = false; return }
        for (let i = 0; i < 8; i++) {
          const el = document.createElement('div'); el.className = 'cd-confetti-piece'
          const size = 7 + Math.random() * 10, dur = 2.5 + Math.random() * 2
          el.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size*(0.4+Math.random()*0.8)}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};animation-duration:${dur}s`
          layer.appendChild(el); setTimeout(() => el.remove(), dur * 1000 + 100)
        }
      }
      spawn(); const t = setInterval(spawn, 220)
      setTimeout(() => { clearInterval(t); setTimeout(() => { layer.remove(); confettiRunning = false }, 3000) }, 30000)
    }

    function tickCountdown() {
      const wrap = document.getElementById('cd-widget-wrap')
      if (!wrap || cdTarget == null) return
      const diff = cdTarget - Date.now()
      const sinceEnd = Date.now() - cdTarget
      if (diff > 0) {
        const t = Math.floor(diff / 1000)
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v }
        set('cd-d', Math.floor(t / 86400)); set('cd-h', pad(Math.floor((t % 86400) / 3600)))
        set('cd-m', pad(Math.floor((t % 3600) / 60))); set('cd-s', pad(t % 60))
        cdCelebrated = false
      } else if (sinceEnd < 86400000) {
        if (!cdCelebrated) {
          cdCelebrated = true
          wrap.innerHTML = `<div class="cd-widget cd-widget--celebrate" style="animation:cd-bg-shift 4s ease infinite alternate">
            <div class="cd-name">${esc(cdName)}</div>
            <div class="cd-celebrate-body">
              <div class="cd-done-msg">🎉 It's a wrap! 🎉</div>
              <div class="cd-done-sub">The deadline has passed — nice work, everyone.</div>
            </div>
          </div>`
          startConfetti()
        }
      } else {
        wrap.style.display = 'none'
        cdTarget = null
      }
    }

    function clock() {
      const el = document.getElementById('dash-clock'); if (!el) return
      el.textContent = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
    }

    function dueMeta(due, today) {
      if (!due) return { cls: 'due-ok', text: '—' }
      const d = parseDay(due), t = parseDay(today)
      const days = Math.round((d - t) / 86400000)
      if (days < 0)   return { cls: 'due-overdue', text: `${Math.abs(days)}d overdue` }
      if (days === 0) return { cls: 'due-soon', text: 'Today' }
      if (days <= 3)  return { cls: 'due-soon', text: `${days}d` }
      return { cls: 'due-ok', text: fmtShort(due) }
    }

    function hexRgba(hex, a) {
      try { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})` }
      catch { return `rgba(180,140,80,${a})` }
    }

    let lastGood = null

    async function load() {
      let data
      try {
        const res = await fetch(`/api/portal?view=dashboard&token=${encodeURIComponent(token)}`)
        if (res.status === 404) { root.className='full-center'; root.innerHTML=`<div class="error-state"><h2>Not found</h2><p>This dashboard link doesn't exist.</p></div>`; return }
        if (!res.ok) throw new Error('HTTP ' + res.status)
        data = await res.json(); lastGood = data
      } catch {
        if (lastGood) { render(lastGood, true); return }
        root.className='full-center'; root.innerHTML=`<div class="error-state"><h2>Unavailable</h2><p>Could not load dashboard. Retrying…</p></div>`; return
      }
      render(data, false)
    }

    function render(d, stale) {
      const today = d.today

      // ── Timers ─────────────────────────────────────────────────────
      const tm = d.timers || {}
      // Reset cd state on fresh data load (not stale)
      if (!stale && tm.countdown) {
        const tgt = new Date(tm.countdown.target)
        if (!isNaN(tgt.getTime())) { cdTarget = tgt.getTime(); cdName = tm.countdown.name; cdCelebrated = false }
      } else if (!stale && !tm.countdown) {
        cdTarget = null
      }

      // Days-since pill (hoisted above cd widget like backend: cd prepended last, so cd is topmost)
      let dsHTML = ''
      if (tm.daysSince) {
        const since = parseDay(tm.daysSince.since)
        if (since) {
          const days = Math.floor((parseDay(today).getTime() - since.getTime()) / 86400000)
          dsHTML = `<div id="ds-widget-wrap">
            <div class="ds-widget">
              <span class="ds-days">${days}</span>
              <span class="ds-label">days since <span class="ds-name">${esc(tm.daysSince.name)}</span></span>
            </div>
          </div>`
        }
      }

      let cdHTML = ''
      if (cdTarget != null && (cdTarget - Date.now()) > -86400000) {
        const diff = cdTarget - Date.now()
        const t = diff > 0 ? Math.floor(diff / 1000) : 0
        cdHTML = diff > 0
          ? `<div id="cd-widget-wrap">
              <div class="cd-widget">
                <div class="cd-name">${esc(cdName)}</div>
                <div class="cd-units">
                  <div class="cd-unit"><div class="cd-num" id="cd-d">${Math.floor(t/86400)}</div><div class="cd-lbl">days</div></div>
                  <div class="cd-sep">:</div>
                  <div class="cd-unit"><div class="cd-num" id="cd-h">${pad(Math.floor((t%86400)/3600))}</div><div class="cd-lbl">hrs</div></div>
                  <div class="cd-sep">:</div>
                  <div class="cd-unit"><div class="cd-num" id="cd-m">${pad(Math.floor((t%3600)/60))}</div><div class="cd-lbl">min</div></div>
                  <div class="cd-sep">:</div>
                  <div class="cd-unit"><div class="cd-num" id="cd-s">${pad(t%60)}</div><div class="cd-lbl">sec</div></div>
                </div>
              </div>
            </div>`
          : `<div id="cd-widget-wrap"></div>` // will be filled by tickCountdown
      }

      // ── Calendar: week table (Mon–Sun of current week) ────────────
      const calWeekStart = parseDay(d.range.start)
      const weekDays = []
      for (let i = 0; i < 7; i++) { const dt = new Date(calWeekStart); dt.setDate(dt.getDate() + i); weekDays.push(dt) }

      const weekLabel = `${weekDays[0].getDate()} ${MONTH[weekDays[0].getMonth()]} – ${weekDays[6].getDate()} ${MONTH[weekDays[6].getMonth()]} ${weekDays[6].getFullYear()}`

      const holByDay = {}
      for (const h of (d.holidays || [])) holByDay[h.date] = h.name

      // Build user columns: unique assignees that have entries this week + all teamMembers
      const teamSet = new Map()
      for (const u of (d.teamMembers || [])) teamSet.set(u.name, u.id)
      // Add any assignees from entries this week not in teamMembers
      for (const e of d.calendar) {
        if (!e.assignee || isoDate(new Date(e.start + 'T00:00:00')) > isoDate(weekDays[6]) || isoDate(new Date(e.end + 'T00:00:00')) < isoDate(weekDays[0])) continue
        if (!teamSet.has(e.assignee)) teamSet.set(e.assignee, e.assignee)
      }
      // Only keep columns that have at least one entry this week
      const usedCols = []
      for (const [name] of teamSet) {
        const hasEntry = d.calendar.some(e => e.assignee === name && e.start <= isoDate(weekDays[6]) && e.end >= isoDate(weekDays[0]))
        if (hasEntry) usedCols.push(name)
      }
      // Fallback: if nobody has assignees, use a single "Entries" column
      const showUserCols = usedCols.length > 0
      // Unassigned entries this week
      const unassignedThisWeek = d.calendar.filter(e => !e.assignee && e.start <= isoDate(weekDays[6]) && e.end >= isoDate(weekDays[0]))

      const colHeaders = showUserCols
        ? usedCols.map(n => `<th class="col-user">${esc(n)}</th>`).join('')
        : `<th class="col-user">Events</th>`

      const tableRows = weekDays.map(dt => {
        const ds = isoDate(dt)
        const isToday   = ds === today
        const isWeekend = dt.getDay() === 0 || dt.getDay() === 6
        const hol = holByDay[ds]
        const dayStr = `${DOW[dt.getDay()]} ${dt.getDate()} ${MONTH[dt.getMonth()]}`
        const trCls = isToday ? 'today' : isWeekend ? 'weekend' : ''
        const tdCls = `tc-td-date${isToday ? ' today' : isWeekend ? ' weekend' : ''}`

        const dateTd = `<td class="${tdCls}">${esc(dayStr)}${isToday ? '<span class="tc-today-badge">TODAY</span>' : ''}${hol ? `<br><span class="tc-hol">${esc(hol)}</span>` : ''}</td>`

        let userTds = ''
        if (showUserCols) {
          for (const colName of usedCols) {
            const cellEvts = d.calendar.filter(e => e.assignee === colName && e.start <= ds && e.end >= ds)
            userTds += `<td class="tc-td-user">${cellEvts.map(e => {
              const bg = hexRgba(e.color, 0.15), border = hexRgba(e.color, 0.55)
              return `<div class="tc-chip" style="background:${bg};border-left:3px solid ${border}">
                <span class="tc-chip-label" style="color:${e.color}">${esc(e.label)}</span>
                ${e.isDeadline ? '<span class="tc-chip-dl">DEADLINE</span>' : ''}
              </div>`
            }).join('')}</td>`
          }
        } else {
          const cellEvts = d.calendar.filter(e => e.start <= ds && e.end >= ds)
          userTds = `<td class="tc-td-user">${cellEvts.map(e => {
            const bg = hexRgba(e.color, 0.15), border = hexRgba(e.color, 0.55)
            return `<div class="tc-chip" style="background:${bg};border-left:3px solid ${border}">
              <span class="tc-chip-label" style="color:${e.color}">${esc(e.label)}${e.assignee ? ' · ' + esc(e.assignee) : ''}</span>
              ${e.isDeadline ? '<span class="tc-chip-dl">DEADLINE</span>' : ''}
            </div>`
          }).join('')}</td>`
        }

        return `<tr class="tc-tr ${trCls}">${dateTd}${userTds}</tr>`
      }).join('')

      const calHTML = `
        <table class="tc-table">
          <thead><tr><th>Date</th>${colHeaders}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>`

      // ── Deliverables ──────────────────────────────────────────────
      const delivHTML = d.deliverables.length
        ? d.deliverables.slice(0, 25).map(dl => {
            const m = dueMeta(dl.due, today)
            return `<div class="deliv-row">
              <div class="deliv-dot" style="background:${m.cls==='due-overdue'?'var(--red)':m.cls==='due-soon'?'var(--amber)':'var(--text-ter)'}"></div>
              <div class="deliv-info">
                <div class="deliv-text">${esc(dl.text)}</div>
                <div class="deliv-proj">${esc(dl.project)}</div>
              </div>
              <div class="deliv-due ${m.cls}">${esc(m.text)}</div>
            </div>`
          }).join('')
        : `<div class="empty">No open deliverables.</div>`

      // ── Live Projects ─────────────────────────────────────────────
      const projHTML = d.liveProjects.length
        ? d.liveProjects.map(p => `
          <div class="proj-row">
            <div class="proj-dot" style="background:${esc(p.dot)}"></div>
            <div class="proj-info">
              <div class="proj-name">${esc(p.name)}</div>
              ${p.client ? `<div class="proj-client">${esc(p.client)}</div>` : ''}
            </div>
            <div class="proj-stage">${esc(p.status)}</div>
          </div>`).join('')
        : `<div class="empty">No live projects.</div>`

      // ── Time Tracked ──────────────────────────────────────────────
      const tt = d.timeTracked
      const ttBars = tt.byProject.slice(0, 6)
      const ttMax  = Math.max(1, ...ttBars.map(b => b.hours))
      const ttHTML = `
        <div class="hours-total">
          <span class="hours-num">${tt.totalHours}</span>
          <span class="hours-unit">hrs</span>
          <span class="hours-cap">${esc(tt.monthLabel)}</span>
        </div>
        ${ttBars.length ? ttBars.map(b => `
          <div class="bar-row">
            <div class="bar-hd"><span class="bar-name">${esc(b.name)}</span><span class="bar-val">${b.hours}h</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(b.hours/ttMax*100).toFixed(1)}%;background:var(--accent)"></div></div>
          </div>`).join('')
          : `<div class="empty">No hours this month.</div>`}`

      // ── Retainers (mimic kanban-card from dashboard) ──────────────
      const retHTML = d.retainers.length
        ? d.retainers.map(r => {
            const hasAlloc = r.allocation != null && r.allocation > 0
            const over = hasAlloc && r.pct > 100
            const warn = hasAlloc && r.pct >= r.alert
            const col  = over ? 'var(--red)' : warn ? 'var(--amber)' : 'var(--green)'
            const pct  = hasAlloc ? Math.min(100, r.pct) : 0
            return `<div class="ret-card">
              <div class="ret-card-title">${esc(r.name)}</div>
              ${r.client ? `<div class="ret-card-client">${esc(r.client)}</div>` : ''}
              ${hasAlloc ? `
                <div class="ret-bar-lbl">
                  <span class="ret-bar-lbl-l">This period</span>
                  <span class="ret-bar-lbl-r">${r.used} / ${r.allocation}h</span>
                </div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
                <div class="ret-alert" style="color:${col}">${over ? `${r.pct - 100}% over` : `${r.pct}% used · ${r.remaining}h remaining`}</div>`
              : `<div class="ret-bar-lbl"><span class="ret-bar-lbl-l">This period</span><span class="ret-bar-lbl-r">${r.used}h</span></div>`}
            </div>`
          }).join('')
        : `<div class="empty" style="padding:8px 0">No retainers.</div>`

      // ── Assemble ──────────────────────────────────────────────────
      root.className = ''; root.style = ''
      root.innerHTML = `
        <header class="hdr">
          <img src="/slate-logo-white.png" alt="" class="hdr-logo" onerror="this.style.display='none'" />
          <div class="hdr-sep"></div>
          <div class="hdr-co">${esc(d.company)}</div>
          <div class="hdr-right">
            ${stale ? '<span class="hdr-stale">⚠ reconnecting…</span>' : ''}
            <span class="hdr-date">${parseDay(today).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}</span>
            <span class="hdr-clock" id="dash-clock">--:--</span>
          </div>
        </header>

        ${cdHTML}
        ${dsHTML}

        <div class="body">
          <!-- Left: Team Calendar -->
          <div class="cal-panel">
            <div class="sec-hd">
              <span class="sec-dot" style="background:var(--accent)"></span>
              <span class="sec-hd-title">Team Calendar</span>
              <span class="cal-week-lbl" style="margin-left:8px">${esc(weekLabel)}</span>
            </div>
            <div class="cal-body">${calHTML}</div>
          </div>

          <!-- Right: 2×2 grid -->
          <div class="right-panel">
            <!-- Top-left: Deliverables -->
            <div class="sec">
              <div class="sec-hd">
                <span class="sec-dot" style="background:#ef4444"></span>
                <span class="sec-hd-title">Deliverables</span>
                <span class="sec-count">${d.deliverables.length}</span>
              </div>
              <div class="sec-body">${delivHTML}</div>
            </div>
            <!-- Top-right: Live Projects -->
            <div class="sec">
              <div class="sec-hd">
                <span class="sec-dot" style="background:#6ec96e"></span>
                <span class="sec-hd-title">Live Projects</span>
                <span class="sec-count">${d.liveProjects.length}</span>
              </div>
              <div class="sec-body">${projHTML}</div>
            </div>
            <!-- Bottom-left: Time Tracked -->
            <div class="sec">
              <div class="sec-hd">
                <span class="sec-dot" style="background:var(--accent)"></span>
                <span class="sec-hd-title">Time Tracked</span>
              </div>
              <div class="sec-body">${ttHTML}</div>
            </div>
            <!-- Bottom-right: Retainers -->
            <div class="sec">
              <div class="sec-hd">
                <span class="sec-dot" style="background:#a78bfa"></span>
                <span class="sec-hd-title">Retainers</span>
                <span class="sec-count">${d.retainers.length}</span>
              </div>
              <div class="sec-body">${retHTML}</div>
            </div>
          </div>
        </div>`

      clock()
      tickCountdown()
    }

    load()
    setInterval(load, REFRESH_MS)
    setInterval(clock, 15000)
    setInterval(tickCountdown, 1000)
  </script>
</body>
</html>
